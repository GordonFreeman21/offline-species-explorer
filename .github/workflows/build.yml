name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go mod tidy

      - run: wails build -ldflags "-s -w"
        env:
          CGO_ENABLED: 0

      - uses: actions/upload-artifact@v4
        with:
          name: offline-species-explorer-windows-amd64.exe
          path: build/bin/offline-species-explorer.exe

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc libgtk-3-dev libwebkit2gtk-4.1-dev \
            libgtk-3-0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go mod tidy

      - run: wails build -ldflags "-s -w"

      - name: Build AppImage
        run: |
          mkdir -p appdir/usr/bin appdir/usr/share/applications appdir/usr/share/icons/hicolor/512x512/apps
          cp build/bin/offline-species-explorer appdir/usr/bin/
          cat > appdir/offline-species-explorer.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Offline Species Explorer
          Exec=offline-species-explorer
          Icon=appicon
          Categories=Education;Science;
          EOF
          cp build/appicon.png appdir/usr/share/icons/hicolor/512x512/apps/appicon.png
          cp appdir/offline-species-explorer.desktop appdir/
          cp appdir/usr/share/icons/hicolor/512x512/apps/appicon.png appdir/appicon.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy
          ./linuxdeploy --appdir appdir --desktop-file appdir/offline-species-explorer.desktop --icon-file appdir/appicon.png --output appimage
          mv Offline*Explorer*.AppImage build/bin/offline-species-explorer-linux-amd64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: offline-species-explorer-linux-amd64
          path: |
            build/bin/offline-species-explorer
            build/bin/offline-species-explorer-linux-amd64.AppImage

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go mod tidy

      - run: wails build -ldflags "-s -w"

      - name: Build AppImage
        run: |
          mkdir -p appdir/usr/bin appdir/usr/share/applications appdir/usr/share/icons/hicolor/512x512/apps
          cp build/bin/offline-species-explorer appdir/usr/bin/
          cat > appdir/offline-species-explorer.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Offline Species Explorer
          Exec=offline-species-explorer
          Icon=appicon
          Categories=Education;Science;
          EOF
          cp build/appicon.png appdir/usr/share/icons/hicolor/512x512/apps/appicon.png
          cp appdir/offline-species-explorer.desktop appdir/
          cp appdir/usr/share/icons/hicolor/512x512/apps/appicon.png appdir/appicon.png
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage -O linuxdeploy
          chmod +x linuxdeploy
          ./linuxdeploy --appdir appdir --desktop-file appdir/offline-species-explorer.desktop --icon-file appdir/appicon.png --output appimage
          mv Offline*Explorer*.AppImage build/bin/offline-species-explorer-linux-arm64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: offline-species-explorer-linux-arm64
          path: |
            build/bin/offline-species-explorer
            build/bin/offline-species-explorer-linux-arm64.AppImage

  build-macos-amd64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go mod tidy

      - run: wails build -ldflags "-s -w" -platform darwin/amd64

      - uses: actions/upload-artifact@v4
        with:
          name: offline-species-explorer-macos-amd64
          path: build/bin/offline-species-explorer.app

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: go mod tidy

      - run: wails build -ldflags "-s -w" -platform darwin/arm64

      - uses: actions/upload-artifact@v4
        with:
          name: offline-species-explorer-macos-arm64
          path: build/bin/offline-species-explorer.app

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux-amd64, build-linux-arm64, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/offline-species-explorer-windows-amd64.exe/offline-species-explorer.exe
            artifacts/offline-species-explorer-linux-amd64/offline-species-explorer
            artifacts/offline-species-explorer-linux-amd64/offline-species-explorer-linux-amd64.AppImage
            artifacts/offline-species-explorer-linux-arm64/offline-species-explorer
            artifacts/offline-species-explorer-linux-arm64/offline-species-explorer-linux-arm64.AppImage
            artifacts/offline-species-explorer-macos-amd64/**
            artifacts/offline-species-explorer-macos-arm64/**
          generate_release_notes: true
