<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g transform="translate(256,260)">
    <line x1="0" y1="80" x2="-120" y2="-80" stroke="url(#blue)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="80" x2="120" y2="-80" stroke="url(#blue)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="-120" y1="-80" x2="-190" y2="-210" stroke="url(#cyan)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="-120" y1="-80" x2="-50" y2="-210" stroke="url(#cyan)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="120" y1="-80" x2="190" y2="-210" stroke="url(#cyan)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="120" y1="-80" x2="50" y2="-210" stroke="url(#cyan)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="-190" y1="-210" x2="-230" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-190" y1="-210" x2="-150" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-50" y1="-210" x2="-80" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-50" y1="-210" x2="-20" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="190" y1="-210" x2="230" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="190" y1="-210" x2="150" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="50" y1="-210" x2="80" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="50" y1="-210" x2="20" y2="-320" stroke="url(#green)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

    <circle cx="0" cy="80" r="14" fill="url(#blue)" filter="url(#glow)"/>
    <circle cx="-120" cy="-80" r="10" fill="url(#blue)"/>
    <circle cx="120" cy="-80" r="10" fill="url(#blue)"/>
    <circle cx="-190" cy="-210" r="8" fill="url(#cyan)"/>
    <circle cx="-50" cy="-210" r="8" fill="url(#cyan)"/>
    <circle cx="190" cy="-210" r="8" fill="url(#cyan)"/>
    <circle cx="50" cy="-210" r="8" fill="url(#cyan)"/>
  </g>

  <g transform="translate(130,380)">
    <rect x="0" y="0" width="252" height="28" rx="14" fill="#334155" stroke="url(#blue)" stroke-width="2" opacity="0.9"/>
    <circle cx="28" cy="14" r="6" fill="url(#blue)" filter="url(#glow)"/>
    <rect x="46" y="7" width="90" height="6" rx="3" fill="#64748b"/>
    <rect x="46" y="16" width="130" height="5" rx="2.5" fill="#475569"/>
  </g>
</svg>
