<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Species Explorer</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Offline Species Explorer</h1>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search by common or scientific name..." autofocus>
                <button id="search-btn">Search</button>
            </div>
        </header>
        <main>
            <aside id="results-panel">
                <h2>Results</h2>
                <div id="status-global" class="status-msg hidden"></div>
                <div id="results-list"></div>
                <div id="no-results" class="hidden">
                    <p>No species found locally.</p>
                    <div class="fetch-section">
                        <input type="text" id="fetch-input" placeholder="Enter species name to fetch...">
                        <button id="fetch-btn" class="action-btn">Fetch from API</button>
                    </div>
                </div>
            </aside>
            <section id="detail-panel">
                <div id="empty-state">
                    <p>Select a species to view its taxonomic hierarchy.</p>
                </div>
                <div id="tree-view" class="hidden">
                    <h2 id="species-title"></h2>
                    <div id="taxonomy-tree"></div>
                    <button id="sync-btn" class="action-btn">Sync from Nimbus API</button>
                    <div id="status-msg" class="status-msg hidden"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
